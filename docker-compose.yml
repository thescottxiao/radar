services:
  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar
      POSTGRES_DB: radar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar"]
      interval: 5s
      timeout: 3s
      retries: 5

  db-test:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: radar_test
      POSTGRES_PASSWORD: radar_test
      POSTGRES_DB: radar_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar_test"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://radar:radar@db:5432/radar
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
